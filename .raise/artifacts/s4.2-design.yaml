story: 'S4.2'
epic: 'E4'
content:
  summary: >
    SICEB has no inventory tracking. This story adds CQRS-based delta inventory mutations
    with PG trigger materialization, pg_notify → STOMP real-time push, partitioned tables,
    and RLS enforcement — enabling branch managers to record stock movements and admins
    to see cross-branch inventory in real time.
  complexity: complex
  acceptance_criteria:
    - id: AC1
      description: '5 delta command types accepted via REST (increment, decrement, adjust, threshold, expiration)'
      verifiable: true
    - id: AC2
      description: 'Idempotency — duplicate key returns original result, no second write'
      verifiable: true
    - id: AC3
      description: 'Stock materialized within same transaction as delta insert (PG trigger, no eventual consistency)'
      verifiable: true
    - id: AC4
      description: 'pg_notify → STOMP push delivers change to subscribed client < 2 seconds end-to-end'
      verifiable: true
    - id: AC5
      description: 'RLS enforced: service manager sees only own service items; admin cross-branch via admin_reporting'
      verifiable: true
    - id: AC6
      description: 'Partition pruning confirmed via EXPLAIN ANALYZE on single-branch inventory query'
      verifiable: true
    - id: AC7
      description: 'LowStockAlert (OK/LOW_STOCK/OUT_OF_STOCK) and ExpirationAlert (OK/EXPIRING_SOON/EXPIRED) projections correct'
      verifiable: true
    - id: AC8
      description: 'PWA InventoryRealtimeManager subscribes/unsubscribes correctly on branch switch'
      verifiable: true
    - id: AC9
      description: 'No direct UPDATE on inventory_deltas — append-only enforced'
      verifiable: true
    - id: AC10
      description: 'WebSocket subscription to another branch channel without inventory:read_all is rejected'
      verifiable: true
  integration_points:
