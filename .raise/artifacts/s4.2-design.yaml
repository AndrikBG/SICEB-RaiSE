  decisions:
    - id: D-S42-1
      choice: 'PG trigger materialization (same transaction) instead of Java-side projection'
      rationale: 'Stock must be immediately consistent — no gap between delta insert and materialized state. ClinicalEventProjector is Java-side but tolerates eventual consistency; inventory does not.'
      alternatives_considered:
        - 'Java ClinicalEventProjector pattern (rejected: eventual consistency gap)'
        - 'Materialized view with REFRESH (rejected: not real-time)'
    - id: D-S42-2
      choice: 'pg_notify for WebSocket bridge instead of application-level event publishing'
      rationale: 'Trigger already runs in DB transaction — pg_notify from trigger guarantees event fires iff materialization succeeds. Application-level would require polling or change-data-capture.'
      alternatives_considered:
        - 'Spring ApplicationEvent (rejected: requires separate listener, possible ordering issues)'
        - 'Debezium CDC (rejected: infrastructure overhead for single-instance deployment)'
    - id: D-S42-3
      choice: 'Extend existing permission model with 3 new granular keys rather than replacing existing ones'
      rationale: 'V010 already seeds inventory:read and inventory:manage used by other features. Adding inventory:read_all, inventory:read_service, inventory:adjust preserves backward compatibility.'
      alternatives_considered:
        - 'Replace inventory:read with read_all + read_service (rejected: breaks existing role assignments)'
