# Integration test profile — Testcontainers provides datasource via @DynamicPropertySource
spring:
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: integration-test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-expiration-ms: 900000
  refresh-expiration-ms: 604800000
  cookie-secure: false

logging:
  level:
    root: WARN
    com.siceb: DEBUG
    org.testcontainers: INFO
