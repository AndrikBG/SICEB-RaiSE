# SonarQube Server local (por defecto). Sobrescribe con -Dsonar.host.url=... si hace falta.
sonar.host.url=http://127.0.0.1:9000
# Contra servidor local NO uses la variable SONAR_TOKEN (es de SonarCloud); el scanner 5.x
# puede intentar bajar el JRE desde api.sonarcloud.io y fallar con 403. Usa solo:
#   mvn verify sonar:sonar "-Dsonar.login=TU_TOKEN_LOCAL"
#
# Arranque con Docker (desde la raíz del repo): docker compose --profile sonar up -d
# En la UI (http://localhost:9000): usuario admin, primera vez cambia contraseña;
# My account > Security > Generate token.
#
sonar.projectKey=com.siceb:siceb-api
sonar.projectName=SICEB API Server

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Informe JaCoCo generado por jacoco-maven-plugin en la fase verify
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
